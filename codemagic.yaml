# Codemagic CI/CD for this app
environment:
  appId: this-app-id
  types:
    - ios
  node: v18

workflows:
  ios-workflow:
    name: iOS
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      app_store_connect: Codemagic
    environment:
      vars:
        BUNDLE_ID: ""
        XCODE_WORKSPACE: "App.xcworkspace"
        XCODE_SCHEME: "App"
    triggering:
      events:
        - push
        - tag
      branch_patterns:
        - pattern: master
          include: true
    scripts:
      - script: |
          #!/usr/bin/env zsh
          set -e
          git clone https://github.com/mattypatty918-wq/$APP_NAME.git --depth 1
          cd $APP_NAME
          git submodule update --init --recursive
          npm install
          npx cap sync ios
          cd ios
          pod install
        name: Setup
      - keychain initialize
      - app-store-connect fetch-signing-files "$BUNDLE_ID" --type IOS_APP_STORE --create
      - keychain add-certificates
      - xcode-project use-profiles
      - xcode-project build-ipa --workspace "$XCODE_WORKSPACE" --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
