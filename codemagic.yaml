# Codemagic CI/CD for typing-blitz
workflows:
  ios-workflow:
    name: iOS
    max_build_duration: 60
    environment:
      vars:
        XCODE_VERSION: "15.0"
        APP_NAME: "typing-blitz"
    triggering:
      branch_patterns:
        - pattern: master
          include: true
    scripts:
      - git clone https://github.com/mattypatty918-wq/typing-blitz.git --depth 1
      - cd typing-blitz && git submodule update --init --recursive
      - cd typing-blitz && xcode-project fetch-dependencies --use-cache
      - cd typing-blitz && xcode-project build --workspace ios/App.xcworkspace --scheme App --configuration Release
    artifacts:
      - typing-blitz/ios/App/App.xcarchive
    publishing:
      app_store_connect:
        api_key: Whitefoxes
