name: Build iOS

on:
  push:
    branches: [master]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci
      - run: npm run build
      - run: npx cap add ios
      - run: npx cap sync ios
      - name: Build iOS
        run: |
          cd ios && xcodebuild -workspace App.xcworkspace -scheme App -configuration Release -destination 'generic/platform=iOS' -derivedDataPath build COMPILER_INDEX_STORE_NO=NO CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO
      - name: Create IPA
        run: |
          mkdir -p build/Payload
          cp -r build/Build/Products/Release-iphoneos/App.app build/Payload/
          cd build && zip -r App.ipa Payload
      - uses: actions/upload-artifact@v4
        with:
          name: App-ipa
          path: ios/build/App.ipa
          retention-days: 7
