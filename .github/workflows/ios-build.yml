name: Build iOS

on:
  push:
    branches: [master]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - uses: nick-fields/retry@v3
        with:
          timeout_minutes: 15
          max_attempts: 3
          command: npx cap sync ios
      - run: |
          cd ios && xcodebuild -workspace App.xcworkspace -scheme App -configuration Release -derivedDataPath build COMPILER_INDEX_STORE_NO=NO CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO
      - run: |
          mkdir -p build/Payload && cp -r build/Build/Products/Release-iphoneos/App.app build/Payload/ && cd build && zip -r App.ipa Payload && ls -la App.ipa
      - uses: actions/upload-artifact@v4
        with:
          name: app
          path: build/App.ipa
          retention-days: 7
